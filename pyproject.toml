[tool.ruff]
fix = true
preview = true

[tool.ruff.lint]
preview = true
future-annotations = true
select = ["ALL"]
ignore = [
  # Ruff Formatter Ignores
  "W191",   # tab-indentation
  "E111",   # indentation-with-invalid-multiple
  "E114",   # indentation-with-invalid-multiple-comment
  "E117",   # over-indented
  "D206",   # docstring-tab-indentation
  "D300",   # triple-single-quotes
  "Q000",   # bad-quotes-inline-string
  "Q001",   # bad-quotes-multiline-string
  "Q002",   # bad-quotes-docstring
  "Q003",   # avoidable-escaped-quote
  "COM812", # missing-trailing-comma
  "COM819", # prohibited-trailing-comma
  "ISC002", # multi-line-implicit-string-concatenation, ignore if used without ISC001 and flake8-implicit-str-concat.allow-multiline = false
  "E501",   # line-too-long

  # Copyright
  "CPY",

  # Boolean in function
  "FBT",

  # No need for init files
  "INP001",

  # Documentation
  "D203", # 1 blank line before class docstring
  "D213", # multi-line-summary-first-line
]

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-builtins]
strict-checking = true

[tool.ruff.format]
docstring-code-format = true
line-ending = "lf"
preview = true

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.lint.per-file-ignores]
"pkgs/claude-desktop/update.py" = [
  "S404", # Uses subprocess intentionally to call nix store prefetch-file.
  "S603", # Command args are constrained to a fixed nix invocation and feed URL.
  "S310", # URL opening is limited to validated HTTPS release feed URLs.
]
"pkgs/codex-app/update.py" = [
  "S404", # Uses subprocess intentionally to call nix store prefetch-file.
  "S603", # Command args are constrained to a fixed nix invocation and appcast URL.
  "S310", # URL opening is limited to validated HTTPS appcast URLs.
  "S405", # xml.etree is sufficient for a trusted upstream Sparkle appcast.
  "S314", # The appcast is a fixed upstream document parsed without entity expansion.
]
"pkgs/steam/update.py" = [
  "S404", # Uses subprocess intentionally to call nix/curl/unzip.
  "S603", # Command args are constrained to fixed local binaries and a validated URL.
  "S310", # URL fetching is limited to validated HTTPS Steam endpoints.
]
"pkgs/ttf-ms-win11-auto/update.py" = [
  "S404", # Uses subprocess intentionally to call nix store prefetch-file.
  "S603", # Command args are constrained to a fixed nix invocation and URL.
  "S310", # URL opening is limited to HTTPS and user-overridable by design.
]
"scripts/update-packages.py" = [
  "S404", # Uses subprocess intentionally in a local CLI orchestrator.
  "S603", # Command args are constrained to local script paths and CLI flags.
]

[tool.ty.environment]
python-platform = "all"

[tool.ty.src]
include = ["**/*.py", "**/*.pyi"]
exclude = [
  ".git",
  ".direnv",
  ".ruff_cache",
  ".mypy_cache",
  ".pytest_cache",
  "**/__pycache__",
  "dist",
  "build",
  "result",
]

[tool.ty.terminal]
error-on-warning = true
output-format = "concise"
