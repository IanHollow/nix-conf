[tool.ruff]
fix = true
preview = true

[tool.ruff.lint]
preview = true
future-annotations = true
select = ["ALL"]
ignore = [
  # Ruff Formatter Ignores
  "tab-indentation",   # tab-indentation
  "indentation-with-invalid-multiple",   # indentation-with-invalid-multiple
  "indentation-with-invalid-multiple-comment",   # indentation-with-invalid-multiple-comment
  "over-indented",   # over-indented
  "docstring-tab-indentation",   # docstring-tab-indentation
  "triple-single-quotes",   # triple-single-quotes
  "bad-quotes-inline-string",   # bad-quotes-inline-string
  "bad-quotes-multiline-string",   # bad-quotes-multiline-string
  "bad-quotes-docstring",   # bad-quotes-docstring
  "avoidable-escaped-quote",   # avoidable-escaped-quote
  "missing-trailing-comma", # missing-trailing-comma
  "prohibited-trailing-comma", # prohibited-trailing-comma
  "multi-line-implicit-string-concatenation", # multi-line-implicit-string-concatenation, ignore if used without ISC001 and flake8-implicit-str-concat.allow-multiline = false
  "line-too-long",   # line-too-long

  # Copyright
  "CPY",

  # Boolean in function
  "FBT",

  # No need for init files
  "implicit-namespace-package",

  # Documentation
  "incorrect-blank-line-before-class", # 1 blank line before class docstring
  "multi-line-summary-second-line", # multi-line-summary-first-line
]

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true

[tool.ruff.lint.flake8-builtins]
strict-checking = true

[tool.ruff.format]
docstring-code-format = true
line-ending = "lf"
preview = true

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.lint.per-file-ignores]
"pkgs/claude-desktop/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix store prefetch-file.
  "subprocess-without-shell-equals-true", # Command args are constrained to a fixed nix invocation and feed URL.
  "suspicious-url-open-usage", # URL opening is limited to validated HTTPS release feed URLs.
]
"pkgs/openai-codex-desktop/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix store prefetch-file.
  "subprocess-without-shell-equals-true", # Command args are constrained to a fixed nix invocation and appcast URL.
  "suspicious-url-open-usage", # URL opening is limited to validated HTTPS appcast URLs.
  "suspicious-xml-etree-import", # xml.etree is sufficient for a trusted upstream Sparkle appcast.
  "suspicious-xml-element-tree-usage", # The appcast is a fixed upstream document parsed without entity expansion.
]
"pkgs/microsoft-teams/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix store prefetch-file.
  "subprocess-without-shell-equals-true", # Command args are constrained to a fixed nix invocation and validated CDN URL.
  "suspicious-url-open-usage", # URL opening is limited to the validated HTTPS Teams production config.
]
"pkgs/remindctl/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix and validate the release binary.
  "subprocess-without-shell-equals-true", # Command args are constrained to fixed nix and validated binary invocations.
  "suspicious-url-open-usage", # URL opening is limited to validated HTTPS GitHub release URLs.
]
"pkgs/agent-skills-updater.py" = [
  "invalid-module-name", # The hyphenated filename is executed as a script, not imported as a Python module.
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix store prefetch-file.
  "subprocess-without-shell-equals-true", # Command args are constrained to a fixed nix invocation and GitHub archive URL.
  "start-process-with-partial-path", # nix is provided by the user environment for this local updater.
  "suspicious-url-open-usage", # URL opening is limited to fixed HTTPS GitHub API endpoints.
  "print", # This command-line updater reports its status and diffs on stdout.
]
"pkgs/spotify-spotx/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix and git for upstream discovery.
  "subprocess-without-shell-equals-true", # Command args are constrained to fixed nix/git invocations and validated refs.
  "suspicious-url-open-usage", # URL opening is limited to validated HTTPS Spotify and GitHub release URLs.
]
"pkgs/steam/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix/curl/unzip.
  "subprocess-without-shell-equals-true", # Command args are constrained to fixed local binaries and a validated URL.
  "suspicious-url-open-usage", # URL fetching is limited to validated HTTPS Steam endpoints.
]
"pkgs/ttf-ms-win11-auto/update.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally to call nix store prefetch-file.
  "subprocess-without-shell-equals-true", # Command args are constrained to a fixed nix invocation and URL.
  "suspicious-url-open-usage", # URL opening is limited to HTTPS and user-overridable by design.
]
"scripts/update-packages.py" = [
  "suspicious-subprocess-import", # Uses subprocess intentionally in a local CLI orchestrator.
  "subprocess-without-shell-equals-true", # Command args are constrained to local script paths and CLI flags.
]

[tool.ty.environment]
python-platform = "all"

[tool.ty.src]
include = ["**/*.py", "**/*.pyi"]
exclude = [
  ".git",
  ".direnv",
  ".ruff_cache",
  ".mypy_cache",
  ".pytest_cache",
  "**/__pycache__",
  "dist",
  "build",
  "result",
]

[tool.ty.terminal]
error-on-warning = true
output-format = "concise"
